<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authors Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4efe8;
      --panel: rgba(255, 255, 255, 0.88);
      --ink: #1d2433;
      --accent: #0e7490;
      --accent-2: #155e75;
      --line: #d6d3d1;
      --danger: #b91c1c;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(14, 116, 144, 0.18), transparent 30%),
        linear-gradient(135deg, #f8f5f0, var(--bg));
      min-height: 100vh;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px 64px;
    }
    h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin: 0 0 12px;
    }
    p { margin: 0 0 24px; }
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(12px);
    }
    form {
      display: grid;
      gap: 12px;
    }
    label {
      font-size: 0.9rem;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }
    button.secondary { background: #475569; }
    button.danger { background: var(--danger); }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 14px 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status {
      min-height: 24px;
      font-size: 0.95rem;
      color: var(--accent-2);
    }
    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Authors Admin</h1>
    <p>Simple CRUD admin page backed by ASP.NET Core and Dapper.</p>
    <div class="layout">
      <section class="panel">
        <h2 id="form-title">Create author</h2>
        <form id="author-form">
          <input type="hidden" id="author-id">
          <div>
            <label for="first-name">First name</label>
            <input id="first-name" name="firstName" required>
          </div>
          <div>
            <label for="last-name">Last name</label>
            <input id="last-name" name="lastName" required>
          </div>
          <button type="submit">Save</button>
          <button type="button" class="secondary" id="cancel-edit">Cancel</button>
        </form>
        <p class="status" id="status"></p>
      </section>
      <section class="panel">
        <h2>Authors</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>First name</th>
              <th>Last name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="authors-body"></tbody>
        </table>
      </section>
    </div>
  </main>

  <script>
    const body = document.getElementById('authors-body');
    const form = document.getElementById('author-form');
    const formTitle = document.getElementById('form-title');
    const statusEl = document.getElementById('status');
    const authorIdInput = document.getElementById('author-id');
    const firstNameInput = document.getElementById('first-name');
    const lastNameInput = document.getElementById('last-name');
    const cancelEditButton = document.getElementById('cancel-edit');

    async function readErrorMessage(response, fallbackMessage) {
      try {
        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const payload = await response.json();

          if (payload?.errors) {
            return Object.values(payload.errors).flat().join(' ');
          }

          if (payload?.detail) {
            return payload.detail;
          }

          if (payload?.title) {
            return payload.title;
          }
        }

        const text = (await response.text()).trim();
        return text || fallbackMessage;
      } catch {
        return fallbackMessage;
      }
    }

    async function loadAuthors() {
      const response = await fetch('/api/authors/');

      if (!response.ok) {
        statusEl.textContent = await readErrorMessage(response, 'Load failed.');
        body.innerHTML = '';
        return;
      }

      const authors = await response.json();

      body.innerHTML = '';

      for (const author of authors) {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${author.id}</td>
          <td>${author.firstName}</td>
          <td>${author.lastName}</td>
          <td>
            <div class="actions">
              <button type="button" class="secondary" data-action="edit">Edit</button>
              <button type="button" class="danger" data-action="delete">Delete</button>
            </div>
          </td>`;

        row.querySelector('[data-action="edit"]').addEventListener('click', () => startEdit(author));
        row.querySelector('[data-action="delete"]').addEventListener('click', () => removeAuthor(author.id));
        body.appendChild(row);
      }
    }

    function startEdit(author) {
      authorIdInput.value = author.id;
      firstNameInput.value = author.firstName;
      lastNameInput.value = author.lastName;
      formTitle.textContent = `Edit author #${author.id}`;
      statusEl.textContent = '';
    }

    function resetForm() {
      authorIdInput.value = '';
      firstNameInput.value = '';
      lastNameInput.value = '';
      formTitle.textContent = 'Create author';
    }

    async function removeAuthor(id) {
      const response = await fetch(`/api/authors/${id}`, { method: 'DELETE' });
      if (!response.ok) {
        statusEl.textContent = await readErrorMessage(response, 'Delete failed.');
        return;
      }

      statusEl.textContent = `Author #${id} deleted.`;
      await loadAuthors();
      resetForm();
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const payload = {
        firstName: firstNameInput.value.trim(),
        lastName: lastNameInput.value.trim()
      };

      const id = authorIdInput.value;
      const response = await fetch(id ? `/api/authors/${id}` : '/api/authors/', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        statusEl.textContent = await readErrorMessage(response, 'Save failed.');
        return;
      }

      statusEl.textContent = id ? `Author #${id} updated.` : 'Author created.';
      resetForm();
      await loadAuthors();
    });

    cancelEditButton.addEventListener('click', resetForm);

    loadAuthors();
  </script>
</body>
</html>
